name: Sync prices from Google Sheet

on:
  schedule:
    - cron: "0 9 * * *"   # nightly ~3am Mountain Time
  workflow_dispatch: {}    # manual "Run workflow" button
  push:
    paths:
      - "templates/**"
      - "data/prices.json"
      - "scripts/build_prices.py"

permissions:
  contents: write
  pages: write

concurrency:
  group: sync-prices
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch sheet, validate, render templates
        env:
          SHEET_CSV_URL: ${{ vars.SHEET_CSV_URL }}
        run: python3 scripts/build_prices.py

      - name: Commit and push if prices changed
        id: commit
        run: |
          git config user.name "price-sync-bot"
          git config user.email "actions@github.com"
          if git diff --quiet; then
            echo "No price changes - site already up to date."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "Auto-sync prices from Google Sheet"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Bot pushes don't auto-trigger the Pages deploy (GitHub anti-loop rule),
      # so request the rebuild explicitly.
      - name: Trigger GitHub Pages rebuild
        if: steps.commit.outputs.pushed == 'true'
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
          echo "Pages rebuild requested."
